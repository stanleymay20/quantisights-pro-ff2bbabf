name: Deploy Supabase Edge Functions

# Deploys all edge functions under supabase/functions/ to the linked Supabase
# project on every push to main that touches a function or this workflow.
#
# Why this exists:
#   Lovable's auto-deploy reliably triggers for edge-function files edited
#   through the Lovable agent session, but external `git push origin main`
#   commits (from local IDEs, other tooling, etc.) have been observed to land
#   in the repo without the corresponding edge function being redeployed.
#   This workflow closes that gap with an explicit, visible deploy step and
#   produces a deploy log you can inspect in the Actions tab.
#
# Required GitHub Actions secrets (Repo Settings -> Secrets and variables -> Actions):
#   - SUPABASE_ACCESS_TOKEN   Personal access token from
#                             https://supabase.com/dashboard/account/tokens
#   - SUPABASE_PROJECT_REF    The project ref: itpwpnwzzitkelffttyx
#
# Notes:
#   - This deploys ALL functions every run. It is simpler and safer than
#     diff-based selective deploys, and the Supabase CLI is fast enough
#     (~1-2 minutes for ~120 functions). If you later want changed-only
#     deploys, replace the loop with a `git diff --name-only` filter.
#   - `_shared` is skipped (it's a shared lib, not a deployable function).
#   - `--no-verify-jwt` matches Lovable's default; per-function overrides
#     are still honored from supabase/config.toml.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-edge-functions.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF is not set"
            exit 1
          fi

      - name: Deploy all edge functions
        run: |
          set -euo pipefail
          shopt -s nullglob

          deployed=0
          failed=0
          failed_names=()

          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"

            # Skip shared lib and any folder without an index.ts
            if [ "$name" = "_shared" ]; then continue; fi
            if [ ! -f "${dir}index.ts" ]; then continue; fi

            echo "::group::Deploying $name"
            if supabase functions deploy "$name" \
                 --project-ref "$SUPABASE_PROJECT_REF" \
                 --no-verify-jwt; then
              deployed=$((deployed + 1))
              echo "::endgroup::"
            else
              failed=$((failed + 1))
              failed_names+=("$name")
              echo "::endgroup::"
              echo "::error::Deploy failed for $name"
            fi
          done

          echo ""
          echo "===================="
          echo "Deployed: $deployed"
          echo "Failed:   $failed"
          if [ "$failed" -gt 0 ]; then
            echo "Failed functions: ${failed_names[*]}"
            exit 1
          fi
