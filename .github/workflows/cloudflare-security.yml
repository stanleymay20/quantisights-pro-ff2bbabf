name: Apply Cloudflare Enterprise Security

on:
  workflow_dispatch: {}

concurrency:
  group: cloudflare-enterprise-security
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report checked out commit
        run: git rev-parse HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "::error::CLOUDFLARE_ZONE_ID is not set"
            exit 1
          fi

      - name: Apply Cloudflare enterprise security headers
        run: npm run cloudflare:apply

      - name: Wait for edge propagation
        run: sleep 30

      - name: Verify live Cloudflare security headers
        run: npm run cloudflare:verify
