apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantivis-production
  namespace: quantivis-production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: quantivis
      environment: production
  template:
    metadata:
      labels:
        app: quantivis
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: quantivis
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
      
      initContainers:
        # Database migration job
        - name: db-migrate
          image: quantivis:latest
          imagePullPolicy: Always
          command: ["npm", "run", "migrate"]
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: supabase-url
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: supabase-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      
      containers:
        - name: quantivis
          image: quantivis-registry.azurecr.io/quantivis:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          env:
            - name: NODE_ENV
              value: "production"
            - name: VITE_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: supabase-url
            - name: VITE_SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: supabase-key
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: sentry-dsn
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: quantivis-secrets
                  key: stripe-secret
            - name: LOG_LEVEL
              value: "info"
          
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - quantivis
                topologyKey: kubernetes.io/hostname
      
      tolerations:
        - key: workload
          operator: Equal
          value: production
          effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: quantivis-service
  namespace: quantivis-production
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: quantivis
    environment: production

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantivis-hpa
  namespace: quantivis-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantivis-production
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
